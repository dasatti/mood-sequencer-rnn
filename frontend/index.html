<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Mood Sequencer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{ --green:#1DB954; --green2:#1ed760; --lav:#c4b5fd; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:-apple-system,'SF Pro Display','Segoe UI',Inter,system-ui,sans-serif; color:#fff; }
  body{ background:#05060a; overflow-x:hidden; }

  /* animated aurora background */
  .bg{ position:fixed; inset:0; z-index:-2; background:
        radial-gradient(1200px 800px at 15% 10%, #0e3b2e 0%, transparent 55%),
        radial-gradient(1000px 700px at 85% 20%, #3b0f4d 0%, transparent 55%),
        radial-gradient(1100px 900px at 60% 95%, #07304a 0%, transparent 60%),
        #05060a; }
  .blob{ position:fixed; z-index:-1; border-radius:50%; filter:blur(70px); opacity:.45; animation:float 18s ease-in-out infinite; }
  .b1{ width:420px;height:420px; background:#1DB954; top:-80px; left:-60px; }
  .b2{ width:380px;height:380px; background:#7c3aed; bottom:-100px; right:-40px; animation-delay:-6s; }
  .b3{ width:300px;height:300px; background:#0ea5e9; top:40%; left:55%; animation-delay:-12s; }
  @keyframes float{ 0%,100%{ transform:translate(0,0) scale(1);} 33%{ transform:translate(40px,-30px) scale(1.1);} 66%{ transform:translate(-30px,25px) scale(.95);} }

  /* glass */
  .glass{ background:rgba(255,255,255,.06); backdrop-filter:blur(22px) saturate(160%);
          -webkit-backdrop-filter:blur(22px) saturate(160%); border:1px solid rgba(255,255,255,.12);
          box-shadow:0 8px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.10); }
  .glass-soft{ background:rgba(255,255,255,.04); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.08); }

  .wrap{ max-width:1080px; margin:0 auto; padding:34px 22px 80px; }

  /* ---------- LOGO / BRAND ---------- */
  .brand{ display:flex; align-items:center; gap:14px; cursor:pointer; }
  .logo{ width:54px; height:54px; min-width:54px; border-radius:16px; position:relative;
         background:linear-gradient(150deg,#1ed760 0%, #11998e 45%, #7c3aed 100%);
         box-shadow:0 10px 30px rgba(29,185,84,.35), inset 0 1px 0 rgba(255,255,255,.35);
         display:flex; align-items:flex-end; justify-content:center; gap:4px; padding:13px 0 14px; overflow:hidden; }
  .logo::after{ content:""; position:absolute; inset:0; background:radial-gradient(60px 30px at 30% 0%, rgba(255,255,255,.45), transparent 70%); }
  .logo i{ display:block; width:5px; border-radius:4px; background:#04130c; opacity:.85; transform-origin:bottom;
           animation:eq 1.1s ease-in-out infinite; }
  .logo i:nth-child(1){ height:9px;  animation-delay:0s;    }
  .logo i:nth-child(2){ height:20px; animation-delay:.15s;  }
  .logo i:nth-child(3){ height:14px; animation-delay:.30s;  }
  .logo i:nth-child(4){ height:24px; animation-delay:.45s;  }
  .logo i:nth-child(5){ height:11px; animation-delay:.60s;  }
  @keyframes eq{ 0%,100%{ transform:scaleY(.45);} 50%{ transform:scaleY(1);} }

  .title{ font-size:34px; font-weight:800; letter-spacing:-1px; line-height:1.02;
          background:linear-gradient(90deg,#fff,#bdf5d6 55%,#9ad);
          -webkit-background-clip:text; background-clip:text; color:transparent; }
  .title .ai{ background:linear-gradient(90deg,#1ed760,#7c3aed);
              -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ color:#9fb0c0; margin-top:3px; font-size:13.5px; }
  .badge{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:#bdf5d6;
          background:rgba(29,185,84,.12); border:1px solid rgba(29,185,84,.35); padding:3px 10px; border-radius:999px; margin-top:6px; }
  .badge .dot{ width:7px;height:7px;border-radius:50%;background:#1ed760; box-shadow:0 0 8px #1ed760; }

  /* segmented control */
  .seg{ display:inline-flex; padding:5px; border-radius:16px; gap:4px; margin:22px 0 6px; }
  .seg button{ all:unset; cursor:pointer; padding:9px 20px; border-radius:12px; font-weight:600; color:#cbd5e1; transition:.25s; }
  .seg button.active{ background:linear-gradient(135deg,var(--green),#0f7a43); color:#04130c; box-shadow:0 6px 18px #1db95455; }

  .field{ width:100%; padding:15px 18px 15px 48px; border-radius:16px; font-size:16px; color:#fff;
          background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); outline:none; transition:.2s; }
  .field:focus{ border-color:var(--green); box-shadow:0 0 0 4px #1db95433; }
  .field::placeholder{ color:#8aa; }

  .row{ display:flex; align-items:center; gap:14px; padding:11px 14px; border-radius:14px; cursor:default; transition:.18s;
        animation:rise .5s cubic-bezier(.2,.8,.2,1) both; }
  .row:hover{ background:rgba(255,255,255,.08); transform:translateY(-2px) scale(1.005); }
  @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .rank{ width:22px; text-align:center; color:#8aa; font-weight:700; }
  .cover{ width:50px;height:50px;min-width:50px; border-radius:12px; display:flex;align-items:center;justify-content:center;
          font-size:20px; box-shadow:0 6px 16px rgba(0,0,0,.5); }
  .t{ font-weight:700; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .a{ font-size:12px; color:#9fb0c0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chip{ background:rgba(255,255,255,.10); color:#cbd5e1; border-radius:20px; padding:4px 12px; font-size:11px; font-weight:600; white-space:nowrap; }
  .bars{ display:flex; align-items:center; gap:6px; width:180px; }
  .lbl{ font-size:10px;color:#7a8; width:10px; }
  .bar{ flex:1; height:7px; background:rgba(255,255,255,.10); border-radius:5px; overflow:hidden; }
  .bar>i{ display:block; height:100%; border-radius:5px; transition:width .8s cubic-bezier(.2,.8,.2,1); }

  .pill{ all:unset; cursor:pointer; padding:9px 16px; border-radius:500px; font-weight:600; font-size:13px; color:#dbeafe;
         background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); transition:.2s; }
  .pill:hover{ border-color:var(--green); transform:translateY(-2px); }
  .pill.active{ background:linear-gradient(135deg,var(--green),#0f7a43); color:#04130c; border-color:transparent; box-shadow:0 6px 18px #1db95455; }

  .score .big{ font-size:34px; font-weight:800; }
  .grad-green{ color:transparent; background:linear-gradient(90deg,#1ed760,#9ad);-webkit-background-clip:text;background-clip:text; }
  .hidden{ display:none; }
  .fade-in{ animation:fade .5s ease both; } @keyframes fade{from{opacity:0}to{opacity:1}}
  ::-webkit-scrollbar{height:8px;width:8px} ::-webkit-scrollbar-thumb{background:#ffffff22;border-radius:8px}
  .genre-scroll{ display:flex; gap:10px; overflow-x:auto; padding:6px 2px 12px; }
  .spin{ width:18px;height:18px;border-radius:50%;border:2px solid #ffffff33;border-top-color:#1ed760;display:inline-block;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"></div><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

<div class="wrap">
  <div class="flex items-end justify-between flex-wrap gap-3">
    <div class="brand" onclick="resetApp()" title="Back to start">
      <div class="logo"><i></i><i></i><i></i><i></i><i></i></div>
      <div>
        <div class="title"><span class="ai">AI</span> Mood Sequencer</div>
        <div class="sub">LSTM-powered playlist engine — find similar tracks or build a smooth mood journey.</div>
        <div class="badge"><span class="dot"></span> <span id="modelStat">connecting to model…</span></div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="glass seg" id="seg">
        <button class="active" data-v="discover">🔎 Discover</button>
        <button data-v="journey">🎚️ Mood Journey</button>
      </div>
      <button class="pill" onclick="resetApp()" title="Reset to start">⟲ Reset</button>
    </div>
  </div>

  <!-- DISCOVER -->
  <section id="discover" class="mt-5">
    <div class="glass" style="border-radius:20px; padding:18px;">
      <div style="position:relative;">
        <span style="position:absolute;left:16px;top:14px;font-size:18px;opacity:.7">🔎</span>
        <input id="q" class="field" placeholder="Search a track…  (e.g. Believer, Yellow, Blinding Lights)"/>
      </div>
      <div id="results" class="mt-2"></div>
    </div>
    <div id="selected" class="mt-4"></div>
    <div id="similar" class="mt-4"></div>
  </section>

  <!-- JOURNEY -->
  <section id="journey" class="mt-5 hidden">
    <div class="glass" style="border-radius:20px; padding:18px;">
      <div style="color:#9fb0c0;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Pick a genre</div>
      <div id="quickGenres" class="flex flex-wrap gap-2"></div>
      <div class="genre-scroll" id="allGenres" style="margin-top:10px"></div>
    </div>
    <div id="journeyOut" class="mt-4"></div>
  </section>

  <div class="sub" style="text-align:center;margin-top:40px;opacity:.6">
    AI Mood Sequencer · LSTM next-track predictor + nearest-neighbour retrieval · Flask backend
  </div>
</div>

<script>
const API = location.protocol.startsWith('http') ? '' : 'http://127.0.0.1:5000';
const FN = ['Energy','Valence','Tempo','Dance','Acoustic'];
const QUICK = ['pop','rock','edm','acoustic','classical','hip-hop','jazz','chill','sad','party','metal','disco','r-n-b','sleep'];

function hue(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))%360;return h;}
function cover(s){const h=hue(s);return `linear-gradient(135deg,hsl(${h},62%,48%),hsl(${(h+55)%360},65%,30%))`;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function rowHTML(rank,t,delay,peak){
  const e=Math.round(t.f[0]*100), v=Math.round(t.f[1]*100);
  const border = peak? 'box-shadow:0 0 0 1px #1DB95488, 0 8px 26px #1db95433;':'';
  return `<div class="row" style="animation-delay:${delay}ms;${border}">
    <div class="rank">${rank}</div>
    <div class="cover" style="background:${cover(t.n)}">♪</div>
    <div style="flex:1;min-width:0"><div class="t">${esc(t.n)}</div><div class="a">${esc(t.a)}</div></div>
    <div class="chip">${esc(t.g)}</div>
    <div class="bars"><span class="lbl">E</span><div class="bar"><i style="width:0%;background:#1DB954" data-w="${e}"></i></div>
      <span class="lbl">V</span><div class="bar"><i style="width:0%;background:#c4b5fd" data-w="${v}"></i></div></div>
  </div>`;
}
function animateBars(scope){ requestAnimationFrame(()=>scope.querySelectorAll('.bar>i').forEach(i=>i.style.width=i.dataset.w+'%')); }

async function api(path, opts){ const r = await fetch(API+path, opts); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }

/* ---------- boot ---------- */
let GENRES=[];
(async function boot(){
  try{
    const m = await api('/api/meta');
    GENRES = m.genres;
    document.getElementById('modelStat').textContent =
      `model live · window ${m.window} · ${m.track_count.toLocaleString()} tracks`;
    const quick = QUICK.filter(g=>GENRES.includes(g));
    document.getElementById('quickGenres').innerHTML = quick.map(g=>`<button class="pill" data-g="${g}" onclick="pickGenre('${g}',this)">${g}</button>`).join('');
    document.getElementById('allGenres').innerHTML = GENRES.map(g=>`<button class="pill" data-g="${g}" onclick="pickGenre('${g}',this)">${g}</button>`).join('');
  }catch(err){
    document.getElementById('modelStat').textContent = 'backend offline — start server.py';
  }
})();

/* ---------- Discover ---------- */
const q=document.getElementById('q'), results=document.getElementById('results');
let searchTimer=null;
q.addEventListener('input',()=>{
  const v=q.value.trim();
  clearTimeout(searchTimer);
  if(!v){results.innerHTML='';return;}
  results.innerHTML='<div class="a" style="padding:10px 14px"><span class="spin"></span> searching…</div>';
  searchTimer=setTimeout(async ()=>{
    try{
      const hits=await api('/api/search?q='+encodeURIComponent(v));
      if(!hits.length){results.innerHTML='<div class="a" style="padding:10px 14px">No matches.</div>';return;}
      results.innerHTML=hits.map((t,k)=>`<div class="row" style="animation-delay:${k*30}ms;cursor:pointer" onclick='selectTrack(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
         <div class="cover" style="width:40px;height:40px;min-width:40px;background:${cover(t.n)}">♪</div>
         <div style="flex:1;min-width:0"><div class="t">${esc(t.n)}</div><div class="a">${esc(t.a)} · ${esc(t.g)}</div></div>
         <div class="chip">select</div></div>`).join('');
    }catch(e){ results.innerHTML='<div class="a" style="padding:10px 14px">Backend offline.</div>'; }
  },220);
});

window.selectTrack=async function(t){
  results.innerHTML=''; q.value=t.n;
  const sel=document.getElementById('selected');
  sel.innerHTML=`<div class="glass fade-in" style="border-radius:20px;padding:20px;display:flex;gap:18px;align-items:center;flex-wrap:wrap">
    <div class="cover" style="width:84px;height:84px;min-width:84px;border-radius:18px;font-size:32px;background:${cover(t.n)}">♪</div>
    <div style="flex:1;min-width:200px"><div style="font-size:22px;font-weight:800">${esc(t.n)}</div>
      <div class="a" style="font-size:14px">${esc(t.a)} · ${esc(t.g)}</div></div>
    <div style="display:flex;gap:18px;flex-wrap:wrap">${t.f.map((x,i)=>`<div style="text-align:center"><div class="grad-green" style="font-size:20px;font-weight:800">${x.toFixed(2)}</div><div class="lbl" style="width:auto">${FN[i]}</div></div>`).join('')}</div>
  </div>`;
  const sim=document.getElementById('similar');
  sim.innerHTML='<div class="glass" style="border-radius:18px;padding:18px"><span class="spin"></span> finding similar tracks…</div>';
  try{
    const data=await api('/api/similar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:t.n,artist:t.a})});
    sim.innerHTML=`<div style="color:#9fb0c0;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:6px 2px">Similar tracks</div>
      <div class="glass" style="border-radius:18px;padding:8px">${data.similar.map((tt,k)=>rowHTML(k+1,tt,k*45,false)).join('')}</div>`;
    animateBars(sim);
  }catch(e){ sim.innerHTML='<div class="a">Backend offline.</div>'; }
};

/* ---------- Journey ---------- */
window.pickGenre=async function(g,el){
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.g===g));
  const out=document.getElementById('journeyOut');
  out.innerHTML='<div class="glass" style="border-radius:18px;padding:22px"><span class="spin"></span> running the LSTM mood journey…</div>';
  try{
    const data=await api('/api/journey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({genre:g,length:8})});
    if(data.error){out.innerHTML=`<div class="a">${esc(data.error)}</div>`;return;}
    const tracks=data.tracks;
    const peak=tracks.reduce((bi,t,k,arr)=>t.f[0]>arr[bi].f[0]?k:bi,0);
    out.innerHTML=`
      <div style="color:#9fb0c0;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:6px 2px">Mood journey · ${esc(g)}</div>
      <div class="glass" style="border-radius:18px;padding:8px">${tracks.map((t,k)=>rowHTML(k+1,t,k*60,k===peak)).join('')}</div>
      <div style="color:#9fb0c0;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:16px 2px 6px">Mood trajectory</div>
      <div class="glass" style="border-radius:18px;padding:18px">${trajSVG(tracks)}</div>
      <div class="flex gap-3 mt-4 flex-wrap">
        <div class="glass score" style="border-radius:16px;padding:16px 20px;flex:1;min-width:150px"><div class="big grad-green" data-cnt="${data.generated_score}">0</div><div class="lbl" style="width:auto">Journey smoothness ↓</div></div>
        <div class="glass score" style="border-radius:16px;padding:16px 20px;flex:1;min-width:150px"><div class="big" style="color:#9fb0c0" data-cnt="${data.random_score}">0</div><div class="lbl" style="width:auto">Random playlist</div></div>
        <div class="glass score" style="border-radius:16px;padding:16px 20px;flex:1;min-width:150px"><div class="big grad-green" data-cnt="${data.ratio}" data-suf="×">0</div><div class="lbl" style="width:auto">Smoother than random</div></div>
      </div>`;
    animateBars(out); drawTraj(); countUp(out);
  }catch(e){ out.innerHTML='<div class="a">Backend offline — start server.py.</div>'; }
};

function trajSVG(tracks){
  const W=940,H=240,pad=30,n=tracks.length;
  const X=k=>pad+k*(W-2*pad)/(n-1), Y=v=>H-pad-v*(H-2*pad);
  const mk=key=>tracks.map((t,k)=>`${X(k).toFixed(1)},${Y(t.f[key]).toFixed(1)}`).join(' ');
  const eng=mk(0), val=mk(1);
  const pts=key=>tracks.map((t,k)=>`<circle cx="${X(k).toFixed(1)}" cy="${Y(t.f[key]).toFixed(1)}" r="4.5" fill="${key===0?'#1DB954':'#c4b5fd'}"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
    <defs><linearGradient id="gE" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1DB95455"/><stop offset="1" stop-color="#1DB95400"/></linearGradient></defs>
    ${[0,.25,.5,.75,1].map(v=>`<line x1="${pad}" y1="${Y(v)}" x2="${W-pad}" y2="${Y(v)}" stroke="#ffffff14"/>`).join('')}
    <polyline class="trajline" points="${eng}" fill="none" stroke="#1DB954" stroke-width="3" stroke-linecap="round"/>
    <polyline class="trajline" points="${val}" fill="none" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
    ${pts(0)}${pts(1)}
    <text x="${pad}" y="${H-6}" fill="#7a8" font-size="11">track 1</text>
    <text x="${W-pad-30}" y="${H-6}" fill="#7a8" font-size="11">track ${n}</text>
    <g font-size="12"><circle cx="${W-150}" cy="14" r="5" fill="#1DB954"/><text x="${W-138}" y="18" fill="#cbd5e1">Energy</text>
      <circle cx="${W-70}" cy="14" r="5" fill="#c4b5fd"/><text x="${W-58}" y="18" fill="#cbd5e1">Valence</text></g>
  </svg>`;
}
function drawTraj(){ document.querySelectorAll('.trajline').forEach(p=>{const L=p.getTotalLength();p.style.strokeDasharray=L;p.style.strokeDashoffset=L;p.getBoundingClientRect();p.style.transition='stroke-dashoffset 1.1s ease';p.style.strokeDashoffset=0;}); }
function countUp(scope){ scope.querySelectorAll('[data-cnt]').forEach(el=>{const tgt=parseFloat(el.dataset.cnt),suf=el.dataset.suf||'';let s=0;const step=tgt/30;const t=setInterval(()=>{s+=step;if(s>=tgt){s=tgt;clearInterval(t);}el.textContent=s.toFixed(tgt<10?(suf==='×'?1:3):0)+suf;},16);}); }

/* ---------- view switch ---------- */
document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('active',x===b));
  document.getElementById('discover').classList.toggle('hidden',b.dataset.v!=='discover');
  document.getElementById('journey').classList.toggle('hidden',b.dataset.v!=='journey');
});

/* ---------- reset / home ---------- */
window.resetApp=function(){
  q.value=''; results.innerHTML='';
  document.getElementById('selected').innerHTML='';
  document.getElementById('similar').innerHTML='';
  document.getElementById('journeyOut').innerHTML='';
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('active', x.dataset.v==='discover'));
  document.getElementById('discover').classList.remove('hidden');
  document.getElementById('journey').classList.add('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
  q.focus();
};
</script>
</body>
</html>
